books:
  post:
    summary: Create a new books
    tags: [Books]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: "Cien años de soledad"
              isbn:
                type: string
                example: "849813122136515155454"
              publicationYear:
                type: string
                example: "1967"
              author:
                type: string
                example: "Gabriel Garcia Marquez"

    responses:
      '201':
        description: Book creado con exito
        content:
          application/json:
            example:
              status: 201
              data:
                title: "Cien años de soledad"
                isbn: "9780307474728"
                publicationYear: "1967"
                author: "Gabriel Garcia Marquez"

      '406':
        description: "No se recibieron datos"
        content:
          application/json:
            example:
              status: 406
              message: "No se recibieron datos"

      '500':
        description: SERVER ERROR
        content:
          application/json:
            example:
              status: 500
              message: "Error creando libro"


  get:
    summary: Get book by ISBN
    tags: [Books]

    parameters:
      - name: isbn
        in: path
        required: true
        schema:
          type: string
        example: "9780307474728"

    responses:
      '200':
        description: Libro encontrado
        content:
          application/json:
            example:
              status: 200
              data:
                title: "Cien años de soledad"
                isbn: "9780307474728"
                publicationYear: "1967"
                author: "Gabriel Garcia Marquez"

      '404':
        description: Libro no encontrado
        content:
          application/json:
            example:
              status: 404
              message: "Book not found"

      '500':
        description: SERVER ERROR
        content:
          application/json:
            example:
              status: 500
              message: "Error obteniendo libro"